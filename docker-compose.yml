services:
  markitdown:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: markitdown
    volumes:
      # 輸入目錄：放置要轉換的文件
      - ./input:/app/input
      # 輸出目錄：轉換後的 Markdown 文件
      - ./output:/app/output
    # 保持容器運行（可選，用於交互式使用）
    stdin_open: true
    tty: true
    # 資源限制（可選）
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
