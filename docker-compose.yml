services:
  markitdown-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: markitdown-api
    ports:
      # 對外 API 端口：可透過環境變數 API_PORT 調整（預設 51083）
      - "${API_PORT:-51083}:8000"
    # 添加 yt-dlp 更新支持
    command: >
      sh -c "yt-dlp -U && uvicorn api.main:app --host 0.0.0.0 --port 8000"
    volumes:
      # 持久化存儲（可選）
      - ${DATA_DIR:-./data}:/app/data
      # 輸入目錄（可選，用於批量處理）
      - ${INPUT_DIR:-./input}:/app/input
      # 輸出目錄（可選，用於批量處理）
      - ${OUTPUT_DIR:-./output}:/app/output
    # 環境變數
    environment:
      # API 配置
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT_INTERNAL=${API_PORT_INTERNAL:-8000}
      - API_DEBUG=${API_DEBUG:-false}
      - API_WORKERS=${API_WORKERS:-1}
      
      # OCR 預設配置
      - DEFAULT_OCR_LANG=${DEFAULT_OCR_LANG:-chi_tra+eng}
      - ENABLE_PLUGINS_BY_DEFAULT=${ENABLE_PLUGINS_BY_DEFAULT:-false}
      
      # 上傳限制（字節）
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-52428800}  # 預設 50MB
      
      # OpenAI（可選，用於高品質 OCR）
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      
      # Azure Document Intelligence（可選）
      - AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT=${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}
      - AZURE_DOCUMENT_INTELLIGENCE_KEY=${AZURE_DOCUMENT_INTELLIGENCE_KEY:-}
      
      # Python 配置
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    
    # 資源限制
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-2G}
          cpus: '${CPU_LIMIT:-2.0}'
        reservations:
          memory: ${MEMORY_RESERVE:-512M}
          cpus: '${CPU_RESERVE:-0.5}'
    
    # 重啟策略
    restart: unless-stopped
    
    # 健康檢查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START_PERIOD:-40s}
    
    # 日誌配置
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"

  # 自動轉換服務（可選）
  markitdown-auto:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: markitdown-auto
    # 不需要暴露端口（後台服務）
    volumes:
      # 輸入目錄（與 API 服務共享）
      - ${INPUT_DIR:-./input}:/app/input
      # 輸出目錄（與 API 服務共享）
      - ${OUTPUT_DIR:-./output}:/app/output
    # 環境變數
    environment:
      # 自動轉換配置
      - AUTO_INPUT_DIR=/app/input
      - AUTO_OUTPUT_DIR=/app/output
      - AUTO_ENABLE_PLUGINS=${AUTO_ENABLE_PLUGINS:-true}
      - AUTO_OCR_LANG=${AUTO_OCR_LANG:-chi_tra+eng}
      - AUTO_MOVE_SOURCE=${AUTO_MOVE_SOURCE:-false}
      - AUTO_POLL_INTERVAL=${AUTO_POLL_INTERVAL:-5}
      - AUTO_MAX_RETRIES=${AUTO_MAX_RETRIES:-3}
      
      # Python 配置
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    
    # 命令：運行自動轉換腳本
    command: ["python", "api/auto_convert.py"]
    
    # 資源限制
    deploy:
      resources:
        limits:
          memory: ${AUTO_MEMORY_LIMIT:-1G}
          cpus: '${AUTO_CPU_LIMIT:-1.0}'
        reservations:
          memory: ${AUTO_MEMORY_RESERVE:-256M}
          cpus: '${AUTO_CPU_RESERVE:-0.25}'
    
    # 重啟策略
    restart: unless-stopped
    
    # 日誌配置
    logging:
      driver: "json-file"
      options:
        max-size: "${AUTO_LOG_MAX_SIZE:-5m}"
        max-file: "${AUTO_LOG_MAX_FILE:-2}"
    
    # 依賴 API 服務（可選，確保同時啟動）
    depends_on:
      - markitdown-api
